<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatIntel Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #080c14;
            background-image: radial-gradient(circle at top, #111827 0%, #030712 100%);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #0d1220;
            border: 1px solid #1a2336;
            border-radius: 8px;
            padding: 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .login-title span {
            color: #3b82f6;
        }

        .login-subtitle {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-control {
            background: #05080e;
            border: 1px solid #1a2336;
            color: #f1f5f9;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 18px;
            font-family: 'JetBrains Mono', monospace;
            transition: border-color 0.15s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            background: #05080e;
            color: #f1f5f9;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            background: #3b82f6;
            border: none;
            color: white;
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #2563eb;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .register-link {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-top: 24px;
        }

        .register-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-title">🔍 Threat<span>Intel</span> Login</div>
    <div class="login-subtitle">SOC Threat Intelligence Registry Portal</div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Access Portal</button>
    </form>

    <div class="register-link">
        Need an analyst account? <a href="/register">Register here</a>
    </div>
</div>

</body>
</html>
