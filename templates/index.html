<!DOCTYPE html>
<html>
<head>
    <title>Threat Intelligence Aggregator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Threat Intelligence Aggregator</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h5>Total Threats</h5>
                    <h2>{{ total_threats }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h5>IPs</h5>
                    <h2>{{ total_ips }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h5>Domains</h5>
                    <h2>{{ total_domains }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h5>Hashes</h5>
                    <h2>{{ total_hashes }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
