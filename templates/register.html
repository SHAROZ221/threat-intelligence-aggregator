<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatIntel Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #080c14;
            background-image: radial-gradient(circle at top, #111827 0%, #030712 100%);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: #0d1220;
            border: 1px solid #1a2336;
            border-radius: 8px;
            padding: 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        .register-title {
            font-size: 24px;
            font-weight: 700;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .register-title span {
            color: #10b981;
        }

        .register-subtitle {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-control {
            background: #05080e;
            border: 1px solid #1a2336;
            color: #f1f5f9;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 18px;
            font-family: 'JetBrains Mono', monospace;
            transition: border-color 0.15s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #10b981;
            background: #05080e;
            color: #f1f5f9;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .btn-register {
            background: #10b981;
            border: none;
            color: white;
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 8px;
        }

        .btn-register:hover {
            background: #059669;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .login-link {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            margin-top: 24px;
        }

        .login-link a {
            color: #10b981;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="register-title">🔍 Threat<span>Intel</span> Register</div>
    <div class="register-subtitle">Create SOC Analyst Profile</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert-{% if category == 'success' %}success{% else %}danger{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Create username" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create password" required>
        </div>
        <button type="submit" class="btn-register">Register Profile</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
