<!DOCTYPE html>
<html>
<head>
    <title>Edit Threat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card">
        <div class="card-body">

            <h2 class="mb-4">Edit Threat</h2>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Indicator</label>
                    <input
                        type="text"
                        name="indicator"
                        class="form-control"
                        value="{{ threat[1] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Type</label>

                    <select
                        name="type"
                        class="form-select">

                        <option value="IP"
                            {% if threat[2] == "IP" %}selected{% endif %}>
                            IP
                        </option>

                        <option value="Domain"
                            {% if threat[2] == "Domain" %}selected{% endif %}>
                            Domain
                        </option>

                        <option value="Hash"
                            {% if threat[2] == "Hash" %}selected{% endif %}>
                            Hash
                        </option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <input
                        type="text"
                        name="category"
                        class="form-control"
                        value="{{ threat[3] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Risk Score</label>
                    <input
                        type="number"
                        name="risk_score"
                        class="form-control"
                        value="{{ threat[4] }}"
                        min="0"
                        max="100"
                        required>
                </div>

                <button
                    type="submit"
                    class="btn btn-primary">
                    Save Changes
                </button>

                <a
                    href="/"
                    class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
