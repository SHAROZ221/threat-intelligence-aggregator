<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Threat | ThreatIntel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #080c14;
            background-image: radial-gradient(circle at top, #111827 0%, #030712 100%);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-card {
            background: #0d1220;
            border: 1px solid #1a2336;
            border-radius: 8px;
            padding: 36px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .edit-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }

        .edit-title {
            font-size: 22px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            background: #05080e;
            border: 1px solid #1a2336;
            color: #f1f5f9;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 14px;
            margin-bottom: 18px;
            font-family: 'JetBrains Mono', monospace;
            transition: border-color 0.15s ease;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            background: #05080e;
            color: #f1f5f9;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-select option {
            background: #0d1220;
        }

        .btn-save {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-save:hover {
            background: #2563eb;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid #1e293b;
            color: #94a3b8;
            padding: 9px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
        }

        .btn-cancel:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }
    </style>
</head>
<body>

<div class="edit-card">
    <div class="edit-title">✏️ Edit Threat Details</div>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Indicator</label>
            <input type="text" name="indicator" class="form-control" value="{{ threat[1] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" class="form-select">
                <option value="IP" {% if threat[2] == "IP" %}selected{% endif %}>IP Address</option>
                <option value="Domain" {% if threat[2] == "Domain" %}selected{% endif %}>Domain</option>
                <option value="Hash" {% if threat[2] == "Hash" %}selected{% endif %}>File Hash</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" value="{{ threat[3] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Risk Score (0-100)</label>
            <input type="number" name="risk_score" class="form-control" value="{{ threat[4] }}" min="0" max="100" required>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="/" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
